version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verifact_backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: verifact_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

  db:
    image: postgres:16-alpine
    container_name: verifact_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=verifact
      - POSTGRES_PASSWORD=verifact_secure_pass
      - POSTGRES_DB=verifact_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
